name: Build & Push Images

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        run: |
          docker build -t ghcr.io/joshuariemer06-spec/mc-dashboard-backend:latest ./backend
          docker push ghcr.io/joshuariemer06-spec/mc-dashboard-backend:latest

      - name: Build & push frontend
        run: |
          docker build -t ghcr.io/joshuariemer06-spec/mc-dashboard-frontend:latest ./frontend
          docker push ghcr.io/joshuariemer06-spec/mc-dashboard-frontend:latest
